<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Decision Frameworks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #00377b;
    --navy-light: #1a4f96;
    --navy-dark: #002255;
    --accent: #e8f0fb;
    --accent-mid: #b8cef0;
    --text: #1a1a2e;
    --text-muted: #5a6070;
    --text-light: #8a8fa0;
    --border: #e4e8f0;
    --surface: #f7f9fd;
    --white: #ffffff;
    --green: #1a7a4a;
    --green-bg: #eaf5ef;
    --red: #b83232;
    --red-bg: #fdf0f0;
    --amber: #8a5500;
    --amber-bg: #fef7e8;
    --purple: #5a3a9a;
    --purple-bg: #f3effe;
    --tag-radius: 4px;
    --card-radius: 10px;
    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    background: var(--navy);
    color: white;
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-icon svg { width: 16px; height: 16px; }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .topbar-subtitle {
    font-size: 12px;
    opacity: 0.6;
    margin-left: 12px;
    padding-left: 12px;
    border-left: 1px solid rgba(255,255,255,0.25);
  }
  .topbar-actions { display: flex; gap: 8px; }
  .btn-print {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-print:hover { background: rgba(255,255,255,0.2); }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-label {
    padding: 20px 18px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .policy-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.12s;
    border-left: 3px solid transparent;
    text-decoration: none;
    color: inherit;
  }
  .policy-item:hover { background: var(--surface); }
  .policy-item.active {
    background: var(--accent);
    border-left-color: var(--navy);
  }
  .policy-item.active .policy-name { color: var(--navy); font-weight: 600; }
  .policy-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .policy-name { font-size: 14px; color: var(--text); }
  .policy-tag {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 16px;
  }
  .sidebar-footer {
    padding: 16px 18px;
    font-size: 12px;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 3rem;
  }

  /* FRAMEWORK HEADER */
  .framework-header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }
  .framework-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .framework-title {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .framework-desc {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 600px;
    line-height: 1.6;
  }
  .framework-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 12px 16px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .framework-badge-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; }
  .framework-badge-value { font-size: 14px; font-weight: 600; color: var(--text); }

  /* SECTIONS */
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .section-full {
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-header-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.1px;
  }
  .card-body { padding: 16px 20px; }

  /* LIST ITEMS */
  .check-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }
  .check-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* TWO-COL INSIDE CARD */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .two-col-side {
    padding: 16px 20px;
  }
  .two-col-side + .two-col-side {
    border-left: 1px solid var(--border);
  }
  .two-col-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ESCALATION STEPS */
  .escalation-steps { display: flex; flex-direction: column; gap: 10px; }
  .escalation-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--navy);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-content {}
  .step-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
  .step-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .step-trigger {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 5px;
  }

  /* EXAMPLES */
  .examples-list { display: flex; flex-direction: column; gap: 10px; }
  .example-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .example-scenario {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .example-body {
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .example-verdict {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    float: right;
  }

  /* MISTAKES */
  .mistake-list { display: flex; flex-direction: column; gap: 10px; }
  .mistake-item {
    display: flex;
    gap: 14px;
    padding: 14px 16px;
    background: var(--red-bg);
    border: 1px solid #f5c0c0;
    border-radius: 8px;
  }
  .mistake-x {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .mistake-content {}
  .mistake-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 3px; }
  .mistake-desc { font-size: 13px; color: #7a3030; line-height: 1.5; }

  /* HR REQUIRED */
  .hr-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hr-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--accent);
    border: 1px solid var(--accent-mid);
    border-radius: 8px;
    font-size: 13px;
    color: var(--navy-dark);
    line-height: 1.4;
  }
  .hr-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--navy);
    flex-shrink: 0;
    margin-top: 4px;
  }

  /* PRINT */
  @media print {
    .topbar, .sidebar, .btn-print { display: none !important; }
    .layout { height: auto; overflow: visible; }
    .main { padding: 1rem; }
    .card { break-inside: avoid; }
    .section-grid { grid-template-columns: 1fr 1fr; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .section-grid { grid-template-columns: 1fr; }
    .hr-items { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .two-col-side + .two-col-side { border-left: none; border-top: 1px solid var(--border); }
    .main { padding: 1.5rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="2" width="14" height="2" rx="1" fill="white"/>
        <rect x="1" y="6" width="9" height="2" rx="1" fill="white" opacity="0.7"/>
        <rect x="1" y="10" width="11" height="2" rx="1" fill="white" opacity="0.5"/>
      </svg>
    </div>
    <span class="topbar-title">Manager Decision Frameworks</span>
    <span class="topbar-subtitle">People Operations</span>
  </div>
  <div class="topbar-actions">
    <button class="btn-print" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6V2h8v4M4 12H2V7h12v5h-2M4 9h8v5H4V9z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/></svg>
      Print / Save PDF
    </button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Policy Frameworks</div>

    <div class="policy-item active" onclick="showPolicy('attendance')" style="cursor:pointer">
      <div class="policy-dot" style="background:#00377b"></div>
      <span class="policy-name">Attendance & Occurrences</span>
    </div>
    <div class="policy-item" onclick="showPolicy('performance')" style="cursor:pointer">
      <div class="policy-dot" style="background:#1a7a4a"></div>
      <span class="policy-name">Performance Management</span>
    </div>
    <div class="policy-item" onclick="showPolicy('corrective')" style="cursor:pointer">
      <div class="policy-dot" style="background:#8a5500"></div>
      <span class="policy-name">Corrective Action</span>
    </div>
    <div class="policy-item" onclick="showPolicy('leave')" style="cursor:pointer">
      <div class="policy-dot" style="background:#5a3a9a"></div>
      <span class="policy-name">Leave of Absence / FMLA</span>
    </div>
    <div class="policy-item" onclick="showPolicy('conduct')" style="cursor:pointer">
      <div class="policy-dot" style="background:#b83232"></div>
      <span class="policy-name">Workplace Conduct</span>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-footer">Last updated March 2025 · People Ops</div>
  </nav>

  <main class="main" id="main-content">
    <!-- Content injected by JS -->
  </main>
</div>

<script>
const policies = {

  attendance: {
    color: '#00377b',
    bg: '#e8f0fb',
    label: 'Attendance & Occurrences',
    category: 'Attendance',
    description: 'Use this framework to consistently apply the attendance policy, determine excused vs. unexcused absences, and know exactly when to escalate.',
    audience: 'All Managers',
    reviewCycle: 'Annual',
    definition: {
      title: 'What counts as an occurrence?',
      icon: '📋',
      iconBg: '#e8f0fb',
      items: [
        { text: 'Any unplanned, unexcused absence from a scheduled shift (full or partial day)', type: 'yes' },
        { text: 'Arriving more than 7 minutes late without prior notice or approval', type: 'yes' },
        { text: 'Leaving early without manager authorization before the end of the scheduled shift', type: 'yes' },
        { text: 'A "no call, no show" (NCNS) — this typically counts as 2 occurrences', type: 'yes' },
        { text: 'Missing a shift immediately before or after a scheduled holiday', type: 'yes' },
        { text: 'Approved FMLA absences — these are protected and never count', type: 'no' },
        { text: 'Bereavement leave taken per policy', type: 'no' },
        { text: 'Jury duty with proper documentation', type: 'no' },
      ]
    },
    excused: {
      excused: [
        'FMLA-protected absences (documented)',
        'Approved vacation or PTO (requested in advance)',
        'Bereavement leave (per policy definition)',
        'Jury duty with summons documentation',
        'Approved accommodation per ADA',
        'Military leave (USERRA protected)',
        'Manager pre-approved schedule change',
      ],
      unexcused: [
        'Calling out without sufficient notice (< 2 hours)',
        'Personal reasons without prior approval',
        'No call, no show (NCNS)',
        'Transportation issues (without ADA nexus)',
        'Oversleeping or forgetting a shift',
        'Absence the day after payday without notice',
        'Repeated illness without medical documentation',
      ]
    },
    escalation: [
      { num: 1, title: 'Verbal Coaching', desc: 'Have a private conversation. Document the date and content in your manager notes. No formal record required yet.', trigger: '2 occurrences in rolling 30 days', triggerColor: '#1a7a4a', triggerBg: '#eaf5ef' },
      { num: 2, title: 'Written Warning', desc: 'Issue a written counseling form. Clearly state the policy, the infractions, and expectations going forward. Employee signs acknowledgment.', trigger: '4 occurrences in rolling 90 days', triggerColor: '#8a5500', triggerBg: '#fef7e8' },
      { num: 3, title: 'Final Written Warning', desc: 'A second formal written document. State that further violations may result in termination. Loop in HR before issuing.', trigger: '6 occurrences in rolling 6 months', triggerColor: '#b83232', triggerBg: '#fdf0f0' },
      { num: 4, title: 'Termination Review', desc: 'Do not terminate without HR approval. HR will review the documentation trail before any final decision is made.', trigger: '7+ occurrences or NCNS pattern', triggerColor: '#5a3a9a', triggerBg: '#f3effe' },
    ],
    hrRequired: [
      'Before issuing a Final Written Warning',
      'Before any termination conversation',
      'When an employee mentions a medical condition',
      'When the employee is pregnant',
      'If the employee has an active ADA accommodation',
      'When you suspect FMLA may apply',
      'When the employee has seniority > 5 years',
      'Any NCNS situation before discipline is issued',
    ],
    examples: [
      { scenario: 'Employee calls out sick — 3rd time this month', verdict: 'occurrence', verdictColor: '#b83232', verdictBg: '#fdf0f0', explanation: 'Unplanned absence without documentation. Log the occurrence and schedule a verbal coaching conversation if this is their 2nd+ this period.' },
      { scenario: 'Employee was 20 minutes late due to car accident', verdict: 'circumstantial', verdictColor: '#8a5500', verdictBg: '#fef7e8', explanation: 'Use judgment. If they called ahead, consider waiving. If pattern exists, document the lateness and have a coaching conversation about reliability.' },
      { scenario: 'Employee no call, no shows on a Friday', verdict: '2 occurrences', verdictColor: '#b83232', verdictBg: '#fdf0f0', explanation: 'NCNS = 2 occurrences per policy. Attempt to contact. Do not issue discipline until HR is notified — there may be a safety concern or FMLA trigger.' },
      { scenario: 'Employee misses a shift the day after a holiday', verdict: 'occurrence', verdictColor: '#b83232', verdictBg: '#fdf0f0', explanation: 'Holiday bridge absences are occurrences unless excused in advance. Apply consistently — favoritism creates legal exposure.' },
      { scenario: 'Employee mentions they have anxiety and couldn\'t come in', verdict: 'stop — call HR', verdictColor: '#5a3a9a', verdictBg: '#f3effe', explanation: 'A medical reason has been disclosed. This may trigger FMLA or ADA. Do not log an occurrence until HR advises. Contact HR before any further action.' },
    ],
    mistakes: [
      { title: 'Applying the policy inconsistently', desc: 'Excusing one employee\'s lateness but writing up another for the same thing is your #1 ER risk. Document everything and apply the same standard every time.' },

      { title: 'Skipping the verbal coaching and jumping to written warnings', desc: 'Progressive discipline matters legally. Skipping steps without documented cause can expose the company in a wrongful termination claim.' },
      { title: 'Failing to document verbal conversations', desc: '"I told them" is not enough. Even informal coaching conversations should be logged in your notes with the date, what was said, and the employee\'s response.' },
      { title: 'Confusing FMLA absences with unexcused absences', desc: 'FMLA-qualifying absences cannot count against an employee\'s attendance record, even if you didn\'t know the absence was FMLA-covered at the time. Retroactive designation is allowed.' },
    ]
  },

  performance: {
    color: '#1a7a4a',
    bg: '#eaf5ef',
    label: 'Performance Management',
    category: 'Performance',
    description: 'Guide for managing underperformance, setting expectations, and executing performance improvement plans (PIPs) correctly and consistently.',
    audience: 'All Managers',
    reviewCycle: 'Ongoing',
    definition: {
      title: 'What counts as a performance issue?',

      iconBg: '#eaf5ef',
      items: [

        { text: 'Repeated quality errors that impact customers, team, or operations', type: 'yes' },
        { text: 'Failure to complete assigned tasks within reasonable timeframes', type: 'yes' },
        { text: 'Inability to meet role requirements after coaching and training', type: 'yes' },
        { text: 'A temporary dip due to a personal crisis or medical issue', type: 'no' },

        { text: 'Underperformance caused by unclear expectations or lack of tools', type: 'no' },

    },
    excused: {

        'Employee returned from extended leave (FMLA/LOA)',

        'Temporary dip during bereavement or family crisis',
        'System/tool failures outside employee control',
      ],
      unexcused: [

        'Low engagement and disregard for team expectations',
      ]
    },
    escalation: [
      { num: 1, title: 'Informal Coaching', desc: 'Direct, private conversation. Identify the gap, set clear expectations, agree on next steps. Document in your own notes.', trigger: 'First sign of a pattern', triggerColor: '#1a7a4a', triggerBg: '#eaf5ef' },
      { num: 2, title: 'Formal Written Warning', desc: 'Document the specific performance gap, what improvement looks like, timeline, and consequences. Employee signature required.', trigger: 'No improvement after 2–3 coaching sessions', triggerColor: '#8a5500', triggerBg: '#fef7e8' },
      { num: 3, title: 'Performance Improvement Plan (PIP)', desc: 'Structured 30/60/90-day plan with specific measurable goals, check-in schedule, and explicit consequence if goals are not met. Requires HR sign-off.', trigger: 'Continued underperformance after written warning', triggerColor: '#b83232', triggerBg: '#fdf0f0' },
      { num: 4, title: 'PIP Outcome / Termination Review', desc: 'At PIP end date, HR and manager jointly assess results. Do not make a termination decision without HR involvement.', trigger: 'End of PIP period', triggerColor: '#5a3a9a', triggerBg: '#f3effe' },

function showPolicy(key) {
  const p = policies[key];
  document.querySelectorAll('.policy-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const checkIcon = (type) => {
    if (type === 'yes') return `<div class="check-icon" style="background:#eaf5ef;color:#1a7a4a">✓</div>`;
    if (type === 'no') return `<div class="check-icon" style="background:#fdf0f0;color:#b83232">✗</div>`;
    return `<div class="check-icon" style="background:#e8f0fb;color:#00377b">→</div>`;

    <div class="framework-header">
      <div>
        <div class="framework-eyebrow">${p.category} · Decision Framework</div>

        <p class="framework-desc">${p.description}</p>
      </div>
      <div style="display:flex;gap:8px;flex-direction:column">
        <div class="framework-badge">
          <div><div class="framework-badge-label">Audience</div><div class="framework-badge-value">${p.audience}</div></div>
        </div>
        <div class="framework-badge">
          <div><div class="framework-badge-label">Review Cycle</div><div class="framework-badge-value">${p.reviewCycle}</div></div>
        </div>
      </div>
    </div>

    <div class="section-grid">
      <!-- DEFINITION -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:${p.definition.iconBg};font-size:14px">${p.definition.icon}</div>
          <span class="card-title">${p.definition.title}</span>
        </div>
        <div class="card-body">
          <ul class="check-list">
            ${p.definition.items.map(item => `
              <li class="check-item">
                ${checkIcon(item.type)}
                <span>${item.text}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      </div>

      <!-- EXCUSED VS UNEXCUSED -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#f1f5f9;font-size:14px">⚖️</div>
          <span class="card-title">Excused vs. Unexcused</span>
        </div>
        <div class="two-col">
          <div class="two-col-side">
            <div class="two-col-label" style="color:#1a7a4a">Excused / Acceptable</div>
            <ul class="check-list">
              ${p.excused.excused.map(item => `
                <li class="check-item">
                  <div class="check-icon" style="background:#eaf5ef;color:#1a7a4a">✓</div>
                  <span style="font-size:13px">${item}</span>
                </li>
              `).join('')}
            </ul>
          </div>
          <div class="two-col-side">
            <div class="two-col-label" style="color:#b83232">Unexcused / Actionable</div>
            <ul class="check-list">
              ${p.excused.unexcused.map(item => `
                <li class="check-item">
                  <div class="check-icon" style="background:#fdf0f0;color:#b83232">✗</div>
                  <span style="font-size:13px">${item}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- ESCALATION -->
    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">📈</div>
          <span class="card-title">Escalation Path — When to Take Action</span>
        </div>
        <div class="card-body">
          <div class="escalation-steps">
            ${p.escalation.map(step => `
              <div class="escalation-step">
                <div class="step-num">${step.num}</div>
                <div class="step-content">
                  <div class="step-title">${step.title}</div>
                  <div class="step-desc">${step.desc}</div>
                  <span class="step-trigger" style="color:${step.triggerColor};background:${step.triggerBg}">Trigger: ${step.trigger}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section-grid">
      <!-- HR REQUIRED -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">🔔</div>
          <span class="card-title">When HR Must Be Involved</span>
        </div>

          <div class="hr-items">

          </div>
        </div>
      </div>
    </div>

    <!-- COMMON MISTAKES -->
    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#fdf0f0;font-size:14px">⛔</div>

                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div style="padding:1.5rem 0 0.5rem;text-align:center;font-size:12px;color:#8a8fa0;">
      This framework is for guidance purposes only. Always consult HR for final decisions. · People Operations · ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long'})}
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
}
