<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Decision Frameworks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #00377b;
    --navy-light: #1a4f96;
    --navy-dark: #002255;
    --accent: #e8f0fb;
    --accent-mid: #b8cef0;
    --text: #1a1a2e;
    --text-muted: #5a6070;
    --text-light: #8a8fa0;
    --border: #e4e8f0;
    --surface: #f7f9fd;
    --white: #ffffff;
    --green: #1a7a4a;
    --green-bg: #eaf5ef;
    --red: #b83232;
    --red-bg: #fdf0f0;
    --amber: #8a5500;
    --amber-bg: #fef7e8;
    --purple: #5a3a9a;
    --purple-bg: #f3effe;
    --tag-radius: 4px;
    --card-radius: 10px;
    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    background: var(--navy);
    color: white;
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-icon svg { width: 16px; height: 16px; }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .topbar-subtitle {
    font-size: 12px;
    opacity: 0.6;
    margin-left: 12px;
    padding-left: 12px;
    border-left: 1px solid rgba(255,255,255,0.25);
  }
  .topbar-actions { display: flex; gap: 8px; }
  .btn-print {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-print:hover { background: rgba(255,255,255,0.2); }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-label {
    padding: 20px 18px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .policy-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.12s;
    border-left: 3px solid transparent;
    text-decoration: none;
    color: inherit;
  }
  .policy-item:hover { background: var(--surface); }
  .policy-item.active {
    background: var(--accent);
    border-left-color: var(--navy);
  }
  .policy-item.active .policy-name { color: var(--navy); font-weight: 600; }
  .policy-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .policy-name { font-size: 14px; color: var(--text); }
  .policy-tag {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 16px;
  }
  .sidebar-footer {
    padding: 16px 18px;
    font-size: 12px;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 3rem;
  }

  /* FRAMEWORK HEADER */
  .framework-header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }
  .framework-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .framework-title {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .framework-desc {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 600px;
    line-height: 1.6;
  }
  .framework-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 12px 16px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .framework-badge-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; }
  .framework-badge-value { font-size: 14px; font-weight: 600; color: var(--text); }

  /* SECTIONS */
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .section-full {
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-header-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.1px;
  }
  .card-body { padding: 16px 20px; }

  /* LIST ITEMS */
  .check-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }
  .check-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* TWO-COL INSIDE CARD */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .two-col-side {
    padding: 16px 20px;
  }
  .two-col-side + .two-col-side {
    border-left: 1px solid var(--border);
  }
  .two-col-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ESCALATION STEPS */
  .escalation-steps { display: flex; flex-direction: column; gap: 10px; }
  .escalation-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--navy);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-content {}
  .step-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
  .step-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .step-trigger {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 5px;
  }

  /* EXAMPLES */
  .examples-list { display: flex; flex-direction: column; gap: 10px; }
  .example-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .example-scenario {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .example-body {
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .example-verdict {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    float: right;
  }

  /* MISTAKES */
  .mistake-list { display: flex; flex-direction: column; gap: 10px; }
  .mistake-item {
    display: flex;
    gap: 14px;
    padding: 14px 16px;
    background: var(--red-bg);
    border: 1px solid #f5c0c0;
    border-radius: 8px;
  }
  .mistake-x {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .mistake-content {}
  .mistake-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 3px; }
  .mistake-desc { font-size: 13px; color: #7a3030; line-height: 1.5; }

  /* HR REQUIRED */
  .hr-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hr-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--accent);
    border: 1px solid var(--accent-mid);
    border-radius: 8px;
    font-size: 13px;
    color: var(--navy-dark);
    line-height: 1.4;
  }
  .hr-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--navy);
    flex-shrink: 0;
    margin-top: 4px;
  }

  /* PRINT */
  @media print {
    .topbar, .sidebar, .btn-print { display: none !important; }
    .layout { height: auto; overflow: visible; }
    .main { padding: 1rem; }
    .card { break-inside: avoid; }
    .section-grid { grid-template-columns: 1fr 1fr; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .section-grid { grid-template-columns: 1fr; }
    .hr-items { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .two-col-side + .two-col-side { border-left: none; border-top: 1px solid var(--border); }
    .main { padding: 1.5rem; }
  }
</style>
</head>

  </nav>

  <main class="main" id="main-content">

</div>

function showPolicy(key) {
  const p = policies[key];
  document.querySelectorAll('.policy-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const checkIcon = (type) => {
    if (type === 'yes') return `<div class="check-icon" style="background:#eaf5ef;color:#1a7a4a">✓</div>`;
    if (type === 'no') return `<div class="check-icon" style="background:#fdf0f0;color:#b83232">✗</div>`;
    return `<div class="check-icon" style="background:#e8f0fb;color:#00377b">→</div>`;
  };

  const html = `
    <div class="framework-header">
      <div>
        <div class="framework-eyebrow">${p.category} · Decision Framework</div>
        <h1 class="framework-title">${p.label}</h1>
        <p class="framework-desc">${p.description}</p>
      </div>
      <div style="display:flex;gap:8px;flex-direction:column">
        <div class="framework-badge">
          <div><div class="framework-badge-label">Audience</div><div class="framework-badge-value">${p.audience}</div></div>
        </div>
        <div class="framework-badge">
          <div><div class="framework-badge-label">Review Cycle</div><div class="framework-badge-value">${p.reviewCycle}</div></div>
        </div>
      </div>
    </div>

    <div class="section-grid">
      <!-- DEFINITION -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:${p.definition.iconBg};font-size:14px">${p.definition.icon}</div>
          <span class="card-title">${p.definition.title}</span>
        </div>
        <div class="card-body">
          <ul class="check-list">
            ${p.definition.items.map(item => `
              <li class="check-item">
                ${checkIcon(item.type)}
                <span>${item.text}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      </div>

      <!-- EXCUSED VS UNEXCUSED -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#f1f5f9;font-size:14px">⚖️</div>
          <span class="card-title">Excused vs. Unexcused</span>
        </div>
        <div class="two-col">
          <div class="two-col-side">
            <div class="two-col-label" style="color:#1a7a4a">Excused / Acceptable</div>
            <ul class="check-list">
              ${p.excused.excused.map(item => `
                <li class="check-item">
                  <div class="check-icon" style="background:#eaf5ef;color:#1a7a4a">✓</div>
                  <span style="font-size:13px">${item}</span>
                </li>
              `).join('')}
            </ul>
          </div>
          <div class="two-col-side">
            <div class="two-col-label" style="color:#b83232">Unexcused / Actionable</div>
            <ul class="check-list">
              ${p.excused.unexcused.map(item => `
                <li class="check-item">
                  <div class="check-icon" style="background:#fdf0f0;color:#b83232">✗</div>
                  <span style="font-size:13px">${item}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- ESCALATION -->
    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">📈</div>
          <span class="card-title">Escalation Path — When to Take Action</span>
        </div>
        <div class="card-body">
          <div class="escalation-steps">
            ${p.escalation.map(step => `
              <div class="escalation-step">
                <div class="step-num">${step.num}</div>
                <div class="step-content">
                  <div class="step-title">${step.title}</div>
                  <div class="step-desc">${step.desc}</div>
                  <span class="step-trigger" style="color:${step.triggerColor};background:${step.triggerBg}">Trigger: ${step.trigger}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section-grid">
      <!-- HR REQUIRED -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">🔔</div>
          <span class="card-title">When HR Must Be Involved</span>
        </div>
        <div class="card-body">
          <div class="hr-items">
            ${p.hrRequired.map(item => `
              <div class="hr-item">
                <div class="hr-dot"></div>
                <span>${item}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- EXAMPLES -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#f3effe;font-size:14px">💡</div>
          <span class="card-title">Real Scenarios & What to Do</span>
        </div>
        <div class="card-body">
          <div class="examples-list">
            ${p.examples.map(ex => `
              <div class="example-item">
                <div class="example-scenario" style="background:${ex.verdictBg};border-color:${ex.verdictBg}">
                  ${ex.scenario}
                  <span class="example-verdict" style="color:${ex.verdictColor};background:${ex.verdictBg};border:1px solid ${ex.verdictColor}22">→ ${ex.verdict}</span>
                  <div style="clear:both"></div>
                </div>
                <div class="example-body">${ex.explanation}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- COMMON MISTAKES -->
    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#fdf0f0;font-size:14px">⛔</div>
          <span class="card-title">Common Mistakes Managers Make</span>
        </div>
        <div class="card-body">
          <div class="mistake-list">
            ${p.mistakes.map(m => `
              <div class="mistake-item">
                <div class="mistake-x">✗</div>
                <div class="mistake-content">
                  <div class="mistake-title">${m.title}</div>
                  <div class="mistake-desc">${m.desc}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div style="padding:1.5rem 0 0.5rem;text-align:center;font-size:12px;color:#8a8fa0;">
      This framework is for guidance purposes only. Always consult HR for final decisions. · Human Resources · ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long'})}
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
}

function showPolicyByKey(key) {
  const valid = Object.keys(policies);
  const target = valid.includes(key) ? key : 'attendance';
  document.querySelectorAll('.policy-item').forEach(el => el.classList.remove('active'));
  const match = document.querySelector(`.policy-item[data-key="${target}"]`);
  if (match) match.classList.add('active');
  const p = policies[target];

  const checkIcon = (type) => {
    if (type === 'yes') return `<div class="check-icon" style="background:#eaf5ef;color:#1a7a4a">✓</div>`;
    if (type === 'no') return `<div class="check-icon" style="background:#fdf0f0;color:#b83232">✗</div>`;
    return `<div class="check-icon" style="background:#e8f0fb;color:#00377b">→</div>`;
  };

  const isRedBanner = p.trainingNote && p.trainingNote.includes('⚡');
  const trainingBanner = p.trainingNote ? `
    <div style="background:${isRedBanner ? '#fdf0f0' : '#fef7e8'};border:1px solid ${isRedBanner ? '#f5c0c0' : '#f0d090'};border-radius:8px;padding:11px 18px;font-size:13px;color:${isRedBanner ? '#7a3030' : '#6b3e00'};line-height:1.6;margin-bottom:1.5rem;">
      ${p.trainingNote}
    </div>` : '';

  const saturdayBlock = p.definition.saturdayProtocol ? `
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#8a5500;margin-bottom:8px;">${p.definition.saturdayProtocol.label}</div>
      <ul class="check-list">
        ${p.definition.saturdayProtocol.items.map(item => `
          <li class="check-item">
            <div class="check-icon" style="background:${item.bg};color:${item.color};font-weight:700;font-size:11px;">${item.num}</div>
            <span>${item.text}</span>
          </li>`).join('')}
      </ul>
    </div>` : '';

  const pointsSection = p.pointsTable ? `
    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">🔢</div>
          <span class="card-title">${p.pointsTable.title}</span>
        </div>
        <div class="card-body">
          <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;">
            <thead>
              <tr>
                <th style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#5a6070;padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;">Occurrence</th>
                <th style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#5a6070;padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;">Points</th>
              </tr>
            </thead>
            <tbody>
              ${p.pointsTable.rows.map(row => `
                <tr>
                  <td style="padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;">${row.label}</td>
                  <td style="padding:9px 10px;border-bottom:1px solid var(--border);">
                    <span style="display:inline-block;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;background:${row.severity === 'high' ? '#fdf0f0' : '#fef7e8'};color:${row.severity === 'high' ? '#b83232' : '#8a5500'};">${row.points}</span>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
          <div style="background:#fdf0f0;border:1px solid #f5c0c0;border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.7;color:#1a1a2e;">
            <span style="font-weight:700;color:#b83232;">⛔ Excessiveness &amp; Disciplinary Action</span><br>
            ${p.pointsTable.thresholds.map(t => `• ${t}`).join('<br>')}
          </div>
        </div>
      </div>
    </div>` : '';

  const html = `
    <div class="framework-header">
      <div>
        <div class="framework-eyebrow">${p.category} · Decision Framework</div>
        <h1 class="framework-title">${p.label}</h1>
        <p class="framework-desc">${p.description}</p>
      </div>
      <div style="display:flex;gap:8px;flex-direction:column">
        <div class="framework-badge">
          <div><div class="framework-badge-label">Audience</div><div class="framework-badge-value">${p.audience}</div></div>
        </div>
        <div class="framework-badge">
          <div><div class="framework-badge-label">Review Cycle</div><div class="framework-badge-value">${p.reviewCycle}</div></div>
        </div>
      </div>
    </div>

    ${trainingBanner}

    <div class="section-grid">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:${p.definition.iconBg};font-size:14px">${p.definition.icon}</div>
          <span class="card-title">${p.definition.title}</span>
        </div>
        <div class="card-body">
          <ul class="check-list">
            ${p.definition.items.map(item => {
              const isProtectedClass = item.text.includes('protected class, such as:');
              if (isProtectedClass) {
                const parts = item.text.split(': ');
                const label = parts[0] + ':';
                const classes = parts[1].split(', ');
                return `<li class="check-item">${checkIcon(item.type)}<span>${label}<br>${classes.map(c => `<span style="display:inline-block;margin-left:4px;font-size:12px;color:var(--text-muted);">• ${c}</span>`).join('<br>')}</span></li>`;
              }
              return `<li class="check-item">${checkIcon(item.type)}<span>${item.text}</span></li>`;
            }).join('')}
          </ul>
          ${saturdayBlock}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#f1f5f9;font-size:14px">⚖️</div>
          <span class="card-title">Excused vs. Unexcused</span>
        </div>
        <div class="two-col">
          <div class="two-col-side">
            <div class="two-col-label" style="color:#1a7a4a">Excused / Acceptable</div>
            <ul class="check-list">
              ${p.excused.excused.map(item => `<li class="check-item"><div class="check-icon" style="background:#eaf5ef;color:#1a7a4a">✓</div><span style="font-size:13px">${item}</span></li>`).join('')}
            </ul>
          </div>
          <div class="two-col-side">
            <div class="two-col-label" style="color:#b83232">Unexcused / Actionable</div>
            <ul class="check-list">
              ${p.excused.unexcused.map(item => `<li class="check-item"><div class="check-icon" style="background:#fdf0f0;color:#b83232">✗</div><span style="font-size:13px">${item}</span></li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
    </div>

    ${pointsSection}

    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">📈</div>
          <span class="card-title">Escalation Path — When to Take Action</span>
        </div>
        <div class="card-body">
          ${p.escalationNote ? `<div style="background:#fef7e8;border:1px solid #f0d090;border-radius:7px;padding:10px 14px;font-size:12px;color:#6b3e00;line-height:1.5;margin-bottom:12px;">${p.escalationNote}</div>` : ''}
          <div class="escalation-steps">
            ${p.escalation.map(step => `
              <div class="escalation-step">
                <div class="step-num">${step.num}</div>
                <div class="step-content">
                  <div class="step-title">${step.title}</div>
                  <div class="step-desc">${step.desc}</div>
                  <span class="step-trigger" style="color:${step.triggerColor};background:${step.triggerBg}">Trigger: ${step.trigger}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section-grid">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#e8f0fb;font-size:14px">🔔</div>
          <span class="card-title">When HR Must Be Involved</span>
        </div>
        <div class="card-body">
          <div class="hr-items">
            ${p.hrRequired.map(item => `<div class="hr-item"><div class="hr-dot"></div><span>${item}</span></div>`).join('')}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#f3effe;font-size:14px">💡</div>
          <span class="card-title">Real Scenarios & What to Do</span>
        </div>
        <div class="card-body">
          ${p.examplesNote ? `<div style="background:#eaf5ef;border:1px solid #a8d8ba;border-radius:7px;padding:9px 13px;font-size:12px;color:#0f4a2a;line-height:1.5;font-weight:600;margin-bottom:10px;">${p.examplesNote}</div>` : ''}
          <div class="examples-list">
            ${p.examples.map(ex => `
              <div class="example-item">
                <div class="example-scenario" style="background:${ex.verdictBg};border-color:${ex.verdictBg}">
                  ${ex.scenario}
                  <span class="example-verdict" style="color:${ex.verdictColor};background:${ex.verdictBg};border:1px solid ${ex.verdictColor}22">→ ${ex.verdict}</span>
                  <div style="clear:both"></div>
                </div>
                <div class="example-body">${ex.explanation}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section-full">
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon" style="background:#fdf0f0;font-size:14px">⛔</div>
          <span class="card-title">Common Mistakes Managers Make</span>
        </div>
        <div class="card-body">
          <div class="mistake-list">
            ${p.mistakes.map(m => `
              <div class="mistake-item">
                <div class="mistake-x">✗</div>
                <div class="mistake-content">
                  <div class="mistake-title">${m.title}</div>
                  <div class="mistake-desc">${m.desc.replace(/\n/g, '<br>')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <div style="padding:1.5rem 0 0.5rem;text-align:center;font-size:12px;color:#8a8fa0;">
      This framework is for guidance purposes only. Always consult HR for final decisions. · Human Resources · ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long'})}
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
  window.scrollTo(0, 0);
}

function showPolicy(key, updateHash = true) {
  if (updateHash) history.replaceState(null, '', '#' + key);
  showPolicyByKey(key);
}

document.querySelectorAll('.policy-item[data-key]').forEach(el => {
  el.addEventListener('click', () => showPolicy(el.dataset.key));
});

function initFromHash() {
  const hash = window.location.hash.replace('#', '').trim();
  showPolicyByKey(hash || 'attendance');
}

window.addEventListener('hashchange', initFromHash);
window.addEventListener('load', initFromHash);
initFromHash();
</script>
</body>
</html>
